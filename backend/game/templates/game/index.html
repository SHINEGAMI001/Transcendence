<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haxball – Multiplayer</title>
  {% load static %}
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      color: #ccc;
    }
    h1 {
      font-size: 18px;
      color: #58a6ff;
      margin-bottom: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #status {
      font-size: 12px;
      margin-bottom: 6px;
      padding: 3px 12px;
      border-radius: 4px;
      background: #1f2937;
      color: #9ca3af;
    }
    #status.connected  { color: #34d399; }
    #status.connecting { color: #fbbf24; }
    #status.error      { color: #f87171; }

    #room-info {
      margin-bottom: 6px;
      font-size: 11px;
      color: #6b7280;
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
    }
    canvas {
      background: #000;
      border: 2px solid #30363d;
      display: block;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(88,166,255,0.08);
    }

    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      flex-direction: column;
      gap: 12px;
    }
    #overlay-msg {
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 24px rgba(88,166,255,0.9);
      display: none;
      text-align: center;
      white-space: pre-line;
      background: rgba(0,0,0,0.55);
      padding: 16px 32px;
      border-radius: 8px;
    }

    #bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 800px;
      margin-top: 8px;
    }
    #controls {
      font-size: 11px;
      color: #4b5563;
    }
    #fps-display {
      font-size: 11px;
      color: #374151;
      font-variant-numeric: tabular-nums;
    }

    /* Team legend */
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 6px;
      font-size: 11px;
    }
    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .leg-left  { background: #1d4ed8; }
    .leg-right { background: #b91c1c; }
    /* --- Live Chat Styles --- */
    #chat-wrapper {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 300px;
      display: flex;
      flex-direction: column;
      z-index: 10;
      pointer-events: none; /* Lets you click through the transparent parts */
    }
    #chat-messages {
      height: 150px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* Keeps messages at the bottom */
      text-shadow: 1px 1px 2px black;
      font-size: 12px;
      margin-bottom: 5px;
      mask-image: linear-gradient(to top, rgba(0,0,0,1) 50%, rgba(0,0,0,0));
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 50%, rgba(0,0,0,0));
    }
    .chat-msg {
      margin-top: 2px;
      word-wrap: break-word;
    }
    .chat-sender { font-weight: bold; color: #fbbf24; }
    
    #chat-input {
      pointer-events: auto; /* Allows clicking on the input box */
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #30363d;
      color: white;
      padding: 6px 10px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      outline: none;
      transition: background 0.2s;
    }
    #chat-input:focus {
      background: rgba(0, 0, 0, 0.9);
      border-color: #58a6ff;
    }
    /* Hide scrollbar for cleaner game UI */
    #chat-messages::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <h1>⚽ Haxball Multiplayer</h1>
  <div id="status" class="connecting">● Connecting…</div>
  <div id="room-info">Room: <span id="room-label">—</span></div>
  <div class="legend">
    <span><span class="legend-dot leg-left"></span>Left team (🟦)</span>
    <span><span class="legend-dot leg-right"></span>Right team (🟥)</span>
    <span style="color:#fbbf24;">★ Gold ring = you</span>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="chat-wrapper">
      <div id="chat-messages"></div>
      <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off" />
    </div>
    <div id="overlay"><span id="overlay-msg"></span></div>
  </div>

  <div id="bottom-bar">
    <div id="controls">WASD / Arrows — move &nbsp;|&nbsp; SPACE — shoot &nbsp;|&nbsp; URL: /game/?room=myroom</div>
    <div id="fps-display">FPS: — | Ping: —</div>
  </div>

  <script src="{% static 'game.js' %}?v=2"></script>
</body>
</html>
